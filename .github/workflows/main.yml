# .github/workflows/main.yml
# CI/CD Pipeline — builds & pushes Docker image, then triggers Render deploy
#
# Required GitHub Secrets (Settings > Secrets and variables > Actions):
#   DOCKER_USERNAME      — Docker Hub username
#   DOCKER_PASSWORD      — Docker Hub password / access token
#   RENDER_SERVICE_ID    — Render service ID  (from Render dashboard URL)
#   RENDER_API_KEY       — Render API key (Render Account > API Keys)
#
# Optional secrets (needed only if your app uses them at runtime):
#   MONGODB_URL_KEY
#   MLFLOW_TRACKING_URI / MLFLOW_TRACKING_USERNAME / MLFLOW_TRACKING_PASSWORD
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_BUCKET_NAME

name: CI/CD — Build, Push & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint / basic sanity checks
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8

      - name: Run flake8 (non-blocking)
        run: flake8 . --count --max-line-length=120 --statistics --exclude=.git,__pycache__,*.egg-info,venv,.venv

  # ─────────────────────────────────────────────
  # 2. Build Docker image & push to Docker Hub
  #    (only on pushes to main)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/networksecurity:latest
            ${{ secrets.DOCKER_USERNAME }}/networksecurity:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # 3. Trigger Render.com re-deploy
  #    (only on pushes to main)
  # ─────────────────────────────────────────────
  deploy-to-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions: {}   # No GitHub token access needed — only calls Render's external API
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy triggered:', d.get('id','N/A'))"
